server:
  port: 8081

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwks-uri: http://127.0.0.1:9000/oauth2/jwks
          issuer-uri: http://127.0.0.1:9000
      client:
        registration:
          downstream-api:
            client-id: bank-service
            # Matches the {noop}bank-service-secret configured in the
            # Authorization Server. In production this comes from an
            # environment variable or secrets manager.
            client-secret: bank-service-secret
            authorization-grant-type: client_credentials
            scope: account.read
        provider:
          downstream-api:
            token-uri: http://127.0.0.1:9000/oauth2/token
  datasource:
    url: jdbc:oracle:thin:@localhost:1522/XEPDB1
    username: labuser
    password: labpass123
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true